name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
        # NOTE: do NOT set `static_site_generator: next` — it injects a generated
        # next.config.js that overrides ours and drops `output: 'export'`, so no
        # out/ is produced. We configure export + basePath in next.config.ts and
        # only consume this step's base_path output below.
      - name: Install dependencies
        run: npm ci
      - name: Build with Next.js
        run: npm run build
        env:
          # base_path is "/<repo>" for project sites, empty for user/custom domains
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
